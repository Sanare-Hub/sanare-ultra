    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = "https://cvzwkifoexnjbtuvwxjr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__VapXVAabPKcv6lXJ8Agag_1nxbP4ay";
        const coreClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [currentPage, setCurrentPage] = useState("auth"); 
            const [currentTab, setCurrentTab] = useState("dashboard"); 
            const [authError, setAuthError] = useState("");
            const [isVerifying, setIsVerifying] = useState(false);
            
            // Database Live State Arrays
            const [announcement, setAnnouncement] = useState(null);
            const [weeklySchedule, setWeeklySchedule] = useState([]);
            const [books, setBooks] = useState([]);
            const [academicResources, setAcademicResources] = useState([]);
            const [batchFolders, setBatchFolders] = useState([]);
            const [configMap, setConfigMap] = useState({});

            // Global Filter Selections
            const [selectedBatch, setSelectedBatch] = useState("Sanare");
            const [selectedSemester, setSelectedSemester] = useState("1st Semester");

            // Drill-Down UI Navigation Pointer States
            const [activeSubject, setActiveSubject] = useState(null);
            const [expandedBlocks, setExpandedBlocks] = useState({});

            // Reset drill-downs instantly on tab or route switches to prevent text conflicts
            useEffect(() => {
                setActiveSubject(null);
                setExpandedBlocks({});
            }, [currentTab, selectedBatch, selectedSemester]);

            useEffect(() => {
                const { data: { subscription } } = coreClient.auth.onAuthStateChange(async (event, session) => {
                    if (session) {
                        setIsVerifying(true);
                        const loggedInEmail = session.user?.email;

                        const { data: whitelistCheck, error: whitelistError } = await coreClient
                            .from('allowed_emails')
                            .select('email')
                            .eq('email', loggedInEmail);

                        if (whitelistError || !whitelistCheck || whitelistCheck.length === 0) {
                            setAuthError("Access Denied: Your Gmail account is not whitelisted.");
                            setIsVerifying(false);
                            setCurrentPage("auth");
                            await coreClient.auth.signOut();
                            return;
                        }

                        setAuthError("");
                        setIsVerifying(false);
                        setCurrentPage("dashboard");
                        
                        // Hydrate database tables
                        fetchConfig();
                        fetchAnnouncements();
                        fetchTimetable();
                        fetchBooks();
                        fetchAcademicResources();
                        fetchBatchFolders();
                    } else {
                        setCurrentPage("auth");
                    }
                });
                return () => subscription.unsubscribe();
            }, []);

            // --- DATABASE SYNC FETCH LAYERS ---
            async function fetchConfig() {
                const { data } = await coreClient.from('system_config').select('*');
                if (data) {
                    const mapped = {};
                    data.forEach(item => mapped[item.key] = item.value);
                    setConfigMap(mapped);
                }
            }
            async function fetchAnnouncements() {
                const { data } = await coreClient.from('announcements').select('*').order('date_posted', { ascending: false }).limit(1);
                if (data && data.length > 0) setAnnouncement(data[0]);
            }
            async function fetchTimetable() {
                const { data } = await coreClient.from('weekly_schedule').select('*').order('day_of_week', { ascending: true });
                if (data) setWeeklySchedule(data);
            }
            async function fetchBooks() {
                const { data } = await coreClient.from('medical_books').select('*').order('book_name', { ascending: true });
                if (data) setBooks(data);
            }
            async function fetchAcademicResources() {
                const { data } = await coreClient.from('academic_resources').select('*').order('topic', { ascending: true });
                if (data) setAcademicResources(data);
            }
            async function fetchBatchFolders() {
                const { data } = await coreClient.from('batch_folders').select('*').order('topic', { ascending: true });
                if (data) setBatchFolders(data);
            }

            // --- G-DRIVE INSTANT STREAM PARSERS ---
            const resolveDriveLinks = (rawUrl) => {
                if (!rawUrl) return { preview: '#', download: '#' };
                const str = String(rawUrl).trim();
                let fileId = '';
                if (str.includes('/d/')) { fileId = str.split('/d/')[1].split('/')[0]; }
                else if (str.includes('id=')) { fileId = str.split('id=')[1].split('&')[0]; }

                if (fileId) {
                    if (str.includes('docs.google.com/document')) {
                        return { preview: `https://docs.google.com/document/d/${fileId}/preview`, download: `https://docs.google.com/document/d/${fileId}/export?format=pdf` };
                    }
                    return { preview: `https://drive.google.com/file/d/${fileId}/preview`, download: `https://drive.google.com/uc?export=download&id=${fileId}` };
                }
                return { preview: str, download: str };
            };

            const toggleBlock = (blockName) => {
                setExpandedBlocks(prev => ({ ...prev, [blockName]: !prev[blockName] }));
            };

            // Dynamic Asset Subject Icon Mapper
            const getSubjectIcon = (subj) => {
                const clean = String(subj).toLowerCase();
                if (clean.includes('anatomy')) return 'skull';
                if (clean.includes('pathology')) return 'biotech';
                if (clean.includes('pharmaco')) return 'pill';
                if (clean.includes('histology')) return 'layers';
                if (clean.includes('biochem')) return 'molecule';
                if (clean.includes('microbio')) return 'coronavirus';
                if (clean.includes('quiz') || clean.includes('exam')) return 'psychology';
                return 'folder_open';
            };

            // --- ADVANCED DATA GROUPING LOGIC ---
            // 1. Group Books by Subject Board
            const groupedBooks = useMemo(() => {
                const map = {};
                books.forEach(b => {
                    if(!map[b.subject]) map[b.subject] = [];
                    map[b.subject].push(b);
                });
                return map;
            }, [books]);

            // 2. Group Academic Resources via Tab + Global Filters
            const filteredResources = useMemo(() => {
                return academicResources.filter(r => r.resource_type === currentTab && r.batch === selectedBatch && r.semester === selectedSemester);
            }, [academicResources, currentTab, selectedBatch, selectedSemester]);

            const groupedResourcesBySubject = useMemo(() => {
                const map = {};
                filteredResources.forEach(r => {
                    if(!map[r.subject]) map[r.subject] = [];
                    map[r.subject].push(r);
                });
                return map;
            }, [filteredResources]);

            // Extraction layer mapping Master Accordion Blocks down to explicit Sub-block chapter arrays
            const activeSubjectMasterBlocks = useMemo(() => {
                if (!activeSubject) return {};
                const items = groupedResourcesBySubject[activeSubject] || [];
                const map = {};
                
                items.forEach(item => {
                    let master = item.block;
                    const match = String(item.block).match(/Block\s+(\d+)/i);
                    if (match) master = `Block ${match[1]}`;
                    
                    if (!map[master]) map[master] = {};
                    let sub = item.block;
                    if (!map[master][sub]) map[master][sub] = [];
                    map[master][sub].push(item);
                });
                return map;
            }, [activeSubject, groupedResourcesBySubject]);

            const daysNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            const currentDayInt = new Date().getDay() === 0 ? 7 : new Date().getDay();

            return (
                <div class="w-full flex min-h-screen overflow-x-hidden">
                    {/* AUTH GATE PANEL VIEW */}
                    {currentPage === "auth" && (
                        <div class="flex-1 flex items-center justify-center px-4 relative z-10">
                            <div class="max-w-md w-full bg-slate-900 border border-white/5 rounded-3xl p-8 text-center space-y-6 glass-panel">
                                <div class="mx-auto w-16 h-16 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-2xl border border-blue-500/30 flex items-center justify-center">
                                    <span class="material-symbols-outlined text-3xl text-primary">shield_check</span>
                                </div>
                                <div class="space-y-2">
                                    <h2 class="text-2xl font-bold tracking-tight text-white">Sanare Command Hub</h2>
                                    <p class="text-sm text-slate-400">Private Academic Terminal. Access restricted strictly to authorized credentials.</p>
                                </div>
                                <button onClick={async () => { setAuthError(""); const { error } = await coreClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + window.location.pathname } }); if (error) setAuthError(error.message); }} disabled={isVerifying} class="w-full py-3.5 px-4 bg-white text-slate-950 font-semibold rounded-xl hover:bg-slate-200 transition-all flex items-center justify-center space-x-3">
                                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285f4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34a853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22l.81-.63z" fill="#fbbc05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1C7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#ea4335"/></svg>
                                    <span>Authorize with Gmail</span>
                                </button>
                                {authError && <div class="text-xs text-rose-400 bg-rose-500/10 border border-rose-500/20 py-2 px-3 rounded-xl">{authError}</div>}
                            </div>
                        </div>
                    )}

                    {/* MAIN APPLICATION NODE DESKTOPS */}
                    {currentPage === "dashboard" && (
                        <div class="w-full flex min-h-screen">
                            
                            {/* PREMIUM SYSTEM SIDEBAR PANEL */}
                            <aside class="hidden md:flex flex-col fixed left-0 top-0 h-full w-64 bg-surface-container-lowest/40 backdrop-blur-3xl border-r border-white/10 py-stack-lg z-40">
                                <div class="px-6 mb-8 flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-white/10 to-white/5 border border-white/10 flex items-center justify-center shadow-lg">
                                        <span class="material-symbols-outlined text-primary text-xl">medical_services</span>
                                    </div>
                                    <div>
                                        <h1 class="font-headline-md text-headline-md font-black text-on-surface tracking-tighter">SANARE ULTRA</h1>
                                        <p class="font-mono-label text-mono-label text-on-surface-variant opacity-70">Medical Terminal</p>
                                    </div>
                                </div>
                                <nav class="flex-1 px-4 space-y-1 overflow-y-auto no-scrollbar text-left">
                                    <button onClick={() => setCurrentTab("dashboard")} class={`w-full px-4 py-3 flex items-center gap-3 rounded-lg transition-all font-label-md text-label-md ${currentTab === "dashboard" ? "bg-white/10 backdrop-blur-md border border-white/5 text-on-surface font-bold shadow-[inset_0_1px_1px_rgba(255,255,255,0.1)]" : "text-on-surface-variant hover:text-on-surface hover:bg-white/5"}`}>
                                        <span class="material-symbols-outlined">terminal</span> Dashboard Overview
                                    </button>

                                        <span class="material-symbols-outlined">library_books</span> Medical Books Matrix
                                    </button>
                                    <button onClick={() => setCurrentTab("Note")} class={`w-full px-4 py-3 flex items-center gap-3 rounded-lg transition-all font-label-md text-label-md ${currentTab === "Note" ? "bg-white/10 backdrop-blur-md border border-white/5 text-on-surface font-bold shadow-[inset_0_1px_1px_rgba(255,255,255,0.1)]" : "text-on-surface-variant hover:text-on-surface hover:bg-white/5"}`}>

                                    <button onClick={() => setCurrentTab("Fresh_Sud_An")} class={`w-full px-4 py-3 flex items-center gap-3 rounded-lg transition-all font-label-md text-label-md ${currentTab === "Fresh_Sud_An" ? "bg-white/10 backdrop-blur-md border border-white/5 text-on-surface font-bold shadow-[inset_0_1px_1px_rgba(255,255,255,0.1)]" : "text-on-surface-variant hover:text-on-surface hover:bg-white/5"}`}>

                                <div class="p-4 border-t border-white/5">
                                    <button onClick={async () => { await coreClient.auth.signOut(); window.location.reload(); }} class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-rose-950/20 text-xs font-bold text-rose-400 transition-all">
                                        <span>Disconnect Terminal</span>
                                        <span class="material-symbols-outlined text-sm">log_out</span>
                                    </button>

                            {/* CONTAINER CONTENT CANVAS CORE PANEL */}
                            <main class="flex-1 flex flex-col md:ml-64 relative min-h-screen overflow-hidden">
                                
                                {/* HIGH-GRADE DYNAMIC COMPONENT STITCH HEADER */}

                                            <nav class="hidden md:flex gap-6 h-full items-center mt-1">
                                                {["Sanare", "Manus", "Vesties"].map(b => (
                                                    <button key={b} onClick={() => setSelectedBatch(b)} class={`font-label-md text-label-md px-1 transition-colors ${selectedBatch === b ? "text-primary font-bold border-b-2 border-primary h-full flex items-center mt-[2px] drop-shadow-[0_0_8px_rgba(180,197,255,0.3)]" : "text-on-surface-variant font-medium hover:text-primary"}`}>{b}</button>
                                                ))}
                                            </nav>
                                        )}
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <button onClick={() => setSelectedSemester("1st Semester")} class={`px-4 py-2 text-label-md font-label-md transition-all rounded ${selectedSemester === "1st Semester" ? "bg-gradient-to-r from-primary to-primary-fixed text-on-primary font-semibold shadow-[0_4px_12px_rgba(180,197,255,0.2)] border border-white/20" : "bg-white/5 backdrop-blur-sm border border-white/10 text-on-surface-variant hover:bg-white/10"}`}>1st Semester</button>
                                        <button onClick={() => setSelectedSemester("2nd Semester")} class={`px-4 py-2 text-label-md font-label-md transition-all rounded ${selectedSemester === "2nd Semester" ? "bg-gradient-to-r from-primary to-primary-fixed text-on-primary font-semibold shadow-[0_4px_12px_rgba(180,197,255,0.2)] border border-white/20" : "bg-white/5 backdrop-blur-sm border border-white/10 text-on-surface-variant hover:bg-white/10"}`}>2nd Semester</button>
                                    </div>
                                </header>

                                <div class="flex-1 overflow-y-auto w-full relative p-gutter md:p-container-padding max-w-[1440px] mx-auto pb-32">
                                    
                                    {/* DASHBOARD GRID SYSTEM LANDING NODES */}
                                    {currentTab === "dashboard" && (
                                        <div class="space-y-6 text-left max-w-4xl mx-auto">
                                            {announcement && (
                                                <div class="glass-panel p-5 border-l-4 border-l-primary shadow-xl rounded-xl">
                                                    <div class="flex items-start gap-4">
                                                        <div class="p-2 bg-primary/10 rounded-xl text-primary flex items-center justify-center"><span class="material-symbols-outlined">campaign</span></div>
                                                        <div class="flex-1 space-y-1">
                                                            <div class="flex justify-between items-center">
                                                                <h3 class="font-bold text-base text-white">Latest Bulletin Notice</h3>
                                                                <span class="text-xs font-mono text-on-surface-variant opacity-60">{announcement.date_posted}</span>
                                                            </div>
                                                            <p class="text-sm text-on-surface-variant leading-relaxed">{announcement.announcement_text}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            <div class="glass-panel p-6 shadow-xl space-y-4 rounded-2xl">
                                                <div class="flex items-center gap-2.5 border-b border-white/5 pb-3">
                                                    <span class="material-symbols-outlined text-primary">calendar_clock</span>
                                                    <h2 class="font-semibold text-lg text-white tracking-tight">Weekly Timetable Schedule</h2>
                                                </div>
                                                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
                                                    {daysNames.map((day, idx) => {
                                                        const i = idx + 1;
                                                        const dayEvents = weeklySchedule.filter(item => item.day_of_week === i);
                                                        return (
                                                            <div key={day} class={`glass-panel rounded-xl p-3 border ${i === currentDayInt ? 'bg-primary/10 border-primary/40 ring-1 ring-primary/30' : 'bg-slate-950/40 border-white/5'} flex flex-col min-h-[140px]`}>
                                                                <h4 class={`text-xs uppercase tracking-wider ${i === currentDayInt ? 'text-primary font-bold' : 'text-on-surface-variant font-medium'}`}>{day}</h4>
                                                                {dayEvents.length === 0 ? (
                                                                    <p class="text-[11px] text-slate-600 italic pt-2">Clear Schedule</p>
                                                                ) : dayEvents.map((ev, eIdx) => (
                                                                    <div key={eIdx} class="border-t border-white/5 mt-1.5 pt-1.5 space-y-0.5">
                                                                        <p class="text-[11px] font-semibold text-slate-200 line-clamp-2">{ev.event_title}</p>
                                                                        <p class="text-[9px] text-slate-500 font-mono">{ev.event_date}</p>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* MODULE TIER SYSTEM: MEDICAL REFERENCE BOOKS MATRIX */}
                                    {currentTab === "books" && (
                                        <div class="space-y-6 text-left w-full">
                                            {configMap.books_master_drive && (
                                                <a href={configMap.books_master_drive} target="_blank" class="p-4 rounded-xl border border-dashed border-white/10 flex items-center justify-between text-xs hover:border-primary/30 bg-white/[0.01] transition-all group max-w-5xl mx-auto">
                                                    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-amber-400">folder</span> <span class="text-on-surface-variant font-semibold">Access Entire Books Master Drive Directory</span></div>
                                                    <span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">arrow_forward</span>
                                                </a>
                                            )}

                                            {!activeSubject ? (
                                                <div class="w-full">
                                                    <div class="mb-10 text-left max-w-5xl mx-auto">
                                                        <h2 class="font-headline-lg text-headline-lg font-bold text-on-surface mb-2 tracking-tight">Level 1 Subject Boards</h2>
                                                        <p class="font-body-lg text-body-lg text-on-surface-variant opacity-90">Select a reference book library board tier.</p>
                                                    </div>
                                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto">
                                                        {Object.keys(groupedBooks).length === 0 ? <div class="col-span-full text-center text-xs text-slate-500 italic py-8">No library entries found.</div> : Object.keys(groupedBooks).sort().map(subj => (
                                                            <button key={subj} onClick={() => setActiveSubject(subj)} class="glass-panel rounded-xl p-8 glass-card-hover flex flex-col justify-between h-48 group relative overflow-hidden text-left w-full">
                                                                <div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                                                                <div class="relative z-10 flex justify-between items-start">
                                                                    <div class="icon-glassy"><span class="material-symbols-outlined text-3xl">{getSubjectIcon(subj)}</span></div>
                                                                    <div class="w-2 h-2 rounded-full bg-primary/80 group-hover:bg-primary transition-colors shadow-[0_0_12px_theme('colors.primary')]"></div>
                                                                </div>
                                                                <div class="relative z-10 mt-auto">
                                                                    <h3 class="font-headline-md text-headline-md text-on-surface mb-1 font-semibold tracking-tight">{subj}</h3>
                                                                    <p class="font-mono-label text-mono-label text-on-surface-variant opacity-80">{groupedBooks[subj].length} Reference Texts</p>
                                                                </div>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : (
                                                <div class="max-w-4xl mx-auto space-y-4">
                                                    <button onClick={() => setActiveSubject(null)} class="inline-flex items-center gap-3 text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md mb-4 group">
                                                        <div class="w-8 h-8 rounded-full glass-icon-container flex items-center justify-center group-hover:-translate-x-1 transition-transform"><span class="material-symbols-outlined text-[18px]">arrow_back</span></div>
                                                        Return to Subject Boards
                                                    </button>
                                                    <h1 class="font-headline-lg text-[40px] leading-[48px] font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-white/60 tracking-tight mb-6">{activeSubject} References</h1>
                                                    
                                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        {groupedBooks[activeSubject].map((b, idx) => {
                                                            const routes = resolveDriveLinks(b.drive_link);
                                                            return (
                                                                <div key={idx} class="group flex items-center justify-between p-4 rounded-xl bg-white/[0.02] hover:bg-white/[0.04] transition-all border border-white/5 hover:border-white/10 shadow-[inset_0_1px_1px_rgba(255,255,255,0.02)]">
                                                                    <div class="flex items-center gap-4 max-w-[70%]">
                                                                        <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/5 shrink-0"><span class="material-symbols-outlined text-on-surface-variant text-[18px]">menu_book</span></div>
                                                                        <span class="font-body-md text-body-md text-on-surface font-medium truncate">{b.book_name}</span>
                                                                    </div>
                                                                    <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                                                                        <a href={routes.preview} target="_blank" class="w-9 h-9 rounded-full glass-button flex items-center justify-center text-on-surface-variant hover:text-white transition-colors"><span class="material-symbols-outlined text-[18px]">visibility</span></a>
                                                                        <a href={routes.download} target="_blank" class="w-9 h-9 rounded-full glass-button flex items-center justify-center text-on-surface-variant hover:text-white transition-colors"><span class="material-symbols-outlined text-[18px]">download</span></a>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* MODULE LIER ACTIONS: ACADEMIC CORE DATA DIRECTORIES */}
                                    {["Note", "Sud_An", "Fresh_Sud_An", "Questionnaire"].includes(currentTab) && (
                                        <div class="space-y-6 text-left w-full">
                                            
                                            {/* TIER 1: SUBJECT GRID PORTALS */}
                                            {!activeSubject ? (
                                                <div class="w-full">
                                                    <div class="mb-10 text-left max-w-5xl mx-auto">
                                                        <h2 class="font-headline-lg text-headline-lg font-bold text-on-surface mb-2 tracking-tight">Level 1 Subject Boards</h2>
                                                        <p class="font-body-lg text-body-lg text-on-surface-variant opacity-90">Select a course module cluster folder.</p>
                                                    </div>
                                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto">
                                                        {Object.keys(groupedResourcesBySubject).length === 0 ? <div class="col-span-full text-center text-xs text-slate-500 italic py-12 border border-dashed border-white/5 rounded-2xl">No asset nodes loaded for {selectedBatch} • {selectedSemester}.</div> : Object.keys(groupedResourcesBySubject).sort().map(subj => (
                                                            <button key={subj} onClick={() => setActiveSubject(subj)} class="glass-panel rounded-xl p-8 glass-card-hover flex flex-col justify-between h-48 group relative overflow-hidden text-left w-full">
                                                                <div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                                                                <div class="relative z-10 flex justify-between items-start">
                                                                    <div class="icon-glassy"><span class="material-symbols-outlined text-3xl">{getSubjectIcon(subj)}</span></div>
                                                                    <div class="w-2 h-2 rounded-full bg-primary/80 group-hover:bg-primary transition-colors shadow-[0_0_12px_theme('colors.primary')]"></div>
                                                                </div>
                                                                <div class="relative z-10 mt-auto">
                                                                    <h3 class="font-headline-md text-headline-md text-on-surface mb-1 font-semibold tracking-tight">{subj}</h3>
                                                                    <p class="font-mono-label text-mono-label text-on-surface-variant opacity-80">{groupedResourcesBySubject[subj].length} Files Indexed</p>
                                                                </div>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : (
                                                
                                                /* TIER 2 & 3: INTERIOR ACCORDIONS & ACCURATE FILE EXTENSIONS */
                                                <div class="max-w-4xl mx-auto space-y-4">
                                                    <button onClick={() => setActiveSubject(null)} class="inline-flex items-center gap-3 text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md mb-6 group">
                                                        <div class="w-8 h-8 rounded-full glass-icon-container flex items-center justify-center group-hover:-translate-x-1 transition-transform"><span class="material-symbols-outlined text-[18px]">arrow_back</span></div>
                                                        Return to Subject Boards
                                                    </button>
                                                    <h1 class="font-headline-lg text-[40px] leading-[48px] font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-white/60 tracking-tight mb-6">{activeSubject}</h1>
                                                    
                                                    <div class="flex flex-col gap-4 relative z-10">
                                                        {Object.keys(activeSubjectMasterBlocks).sort().map(masterBlock => {
                                                            const isExpanded = expandedBlocks[masterBlock];
                                                            const isSingleRedirect = ["Fresh_Sud_An", "Questionnaire"].includes(currentTab);
                                                            
                                                            return (
                                                                <div key={masterBlock} class="glass-panel rounded-2xl overflow-hidden flex flex-col transition-all duration-300">
                                                                    {/* Accordion Block Header Bar Layout */}
                                                                    <div onClick={() => toggleBlock(masterBlock)} class="flex justify-between items-center p-6 bg-white/[0.03] border-b border-white/5 cursor-pointer shadow-[inset_0_-1px_0_rgba(255,255,255,0.02)] select-none">
                                                                        <div class="flex items-center gap-4">
                                                                            <div class="w-10 h-10 rounded-xl glass-icon-container flex items-center justify-center"><span class="material-symbols-outlined text-primary text-[20px]">{isExpanded ? 'folder_open' : 'folder'}</span></div>
                                                                            <h2 class="font-headline-md text-[22px] text-white font-bold">{masterBlock}</h2>
                                                                        </div>
                                                                        <span class={`material-symbols-outlined text-on-surface-variant transition-transform duration-200 ${isExpanded ? 'rotate-180' : ''}`}>expand_more</span>
                                                                    </div>
                                                                    
                                                                    {/* Nested Subgroup Chapter Rows mapping arrays */}
                                                                    {isExpanded && (
                                                                        <div class="p-6 flex flex-col gap-8 bg-black/40 backdrop-blur-3xl shadow-[inset_0_20px_40px_rgba(0,0,0,0.2)]">
                                                                            {Object.keys(activeSubjectMasterBlocks[masterBlock]).sort().map(subBlock => (
                                                                                <div key={subBlock} class="space-y-3">
                                                                                    {subBlock !== masterBlock && (
                                                                                        <h3 class="font-label-md text-[13px] text-tertiary mb-4 flex items-center gap-3 uppercase tracking-wider font-bold">
                                                                                            <div class="w-6 h-6 rounded-lg glass-icon-container flex items-center justify-center"><span class="w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_rgba(180,197,255,0.8)]"></span></div>
                                                                                            {subBlock}
                                                                                        </h3>
                                                                                    )}
                                                                                    <div class="flex flex-col gap-2">
                                                                                        {activeSubjectMasterBlocks[masterBlock][subBlock].map((item, idx) => {
                                                                                            const routes = resolveDriveLinks(item.file_link);
                                                                                            return isSingleRedirect ? (
                                                                                                /* EXCLUSIVE ROW PROTOCOL B: REDIRECT BADGE SYSTEM */
                                                                                                <div key={idx} class="group flex items-center justify-between p-3 rounded-xl bg-primary/[0.03] hover:bg-primary/[0.06] transition-all border border-primary/10 hover:border-primary/20 cursor-pointer shadow-[inset_0_1px_1px_rgba(180,197,255,0.05)]">
                                                                                                    <div class="flex items-center gap-4 max-w-[70%]">
                                                                                                        <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center border border-primary/20 shadow-[0_0_10px_rgba(180,197,255,0.1)] shrink-0"><span class="material-symbols-outlined text-primary text-[18px]">terminal</span></div>
                                                                                                        <span class="font-body-md text-body-md text-primary font-bold truncate">{item.topic}</span>
                                                                                                    </div>
                                                                                                    <a href={item.file_link} target="_blank" class="glass-button rounded-full px-4 py-2 flex items-center gap-2 text-primary border border-primary/20 shrink-0">
                                                                                                        <span class="font-label-md text-label-md font-bold">Open Link</span>
                                                                                                        <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
                                                                                                    </a>
                                                                                                </div>
                                                                                            ) : (
                                                                                                /* EXCLUSIVE ROW PROTOCOL A: STANDARD DOUBLE ACTION LAYOUT */
                                                                                                <div key={idx} class="group flex items-center justify-between p-3 rounded-xl bg-white/[0.02] hover:bg-white/[0.04] transition-all border border-white/5 hover:border-white/10 cursor-pointer shadow-[inset_0_1px_1px_rgba(255,255,255,0.02)]">
                                                                                                    <div class="flex items-center gap-4 max-w-[70%]">
                                                                                                        <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center border border-white/5 shrink-0"><span class="material-symbols-outlined text-on-surface-variant text-[18px]">description</span></div>
                                                                                                        <span class="font-body-md text-body-md text-on-surface font-medium truncate">{item.topic}</span>
                                                                                                    </div>
                                                                                                    <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                                                                                                        <a href={routes.preview} target="_blank" class="w-9 h-9 rounded-full glass-button flex items-center justify-center text-on-surface-variant hover:text-white transition-colors"><span class="material-symbols-outlined text-[18px]">visibility</span></a>
                                                                                                        <a href={routes.download} target="_blank" class="w-9 h-9 rounded-full glass-button flex items-center justify-center text-on-surface-variant hover:text-white transition-colors"><span class="material-symbols-outlined text-[18px]">download</span></a>
                                                                                                    </div>
                                                                                                </div>
                                                                                            );
                                                                                        })}
                                                                                    </div>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* MODULE CORE NODE: BATCH DIRECTORY PARENT ROOT FOLDERS */}
                                    {currentTab === "folders" && (
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left max-w-4xl mx-auto">
                                            {batchFolders.length === 0 ? <div class="col-span-full text-center text-xs text-slate-500 italic py-8">No shared connection matrices generated.</div> : batchFolders.filter(f => f.batch === selectedBatch && f.semester === selectedSemester).map((f, idx) => (
                                                <a key={idx} href={f.folder_link} target="_blank" class="p-5 bg-white/5 backdrop-blur-xl border border-white/10 shadow-lg rounded-xl flex items-center justify-between group transition-all hover:bg-white/10">
                                                    <div class="space-y-1 max-w-[85%]">
                                                        <div class="flex items-center gap-2 text-[9px] font-bold tracking-wider uppercase text-slate-500">
                                                            <span>{f.batch}</span><span>•</span><span>{f.semester}</span><span>•</span><span>{f.category}</span>
                                                        </div>
                                                        <h4 class="text-sm font-semibold text-slate-200 truncate group-hover:text-primary transition-colors">{f.topic}</h4>
                                                        <p class="text-xs text-slate-400 truncate">{f.subject}</p>
                                                    </div>
                                                    <span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">folder_open</span>
                                                </a>
                                            ))}
                                        </div>
                                    )}

                                    {/* MODULE CORE NODE: ROTATIONS CALENDAR VIEW */}
                                    {currentTab === "calendar" && (
                                        <div class="space-y-4 text-left h-full flex flex-col max-w-5xl mx-auto">
                                            <div class="bg-slate-900 border border-white/5 p-2 rounded-2xl h-[65vh] min-h-[450px] flex-1">
                                                <iframe src={configMap.calendar_embed_url || "https://calendar.google.com/calendar/embed?src=en.philippines%23holiday%40group.v.calendar.google.com"} 
                                                        style={{border: 0, borderRadius: "0.75rem"}} class="w-full h-full opacity-75 invert contrast-125" frameborder="0" scrolling="no"></iframe>
                                            </div>
                                        </div>
                                    )}

                                </div>

                                {/* PERSISTENT GRID FOOTER PANEL STIPULATION */}
                                <footer class="w-full py-stack-md px-gutter flex flex-col sm:flex-row justify-between items-center bg-transparent border-t border-white/10 mt-auto opacity-70 hover:opacity-100 transition-opacity gap-4">
                                    <div class="font-mono-label text-mono-label text-on-surface-variant">
                                        © 2026 SANARE ULTRA Terminal. All clinical data encrypted.
                                    </div>
                                    <div class="flex gap-4">
                                        <a class="font-mono-label text-mono-label text-on-surface-variant hover:text-primary transition-colors" href="#">System Status</a>
                                        <a class="font-mono-label text-mono-label text-on-surface-variant hover:text-primary transition-colors" href="#">Documentation</a>
                                    </div>
                                </footer>
                            </main>

                            {/* MOBILE RESPONSIVE SYSTEM NAVIGATION DOCK CONTROLLER STRIP */}
                            <nav class="md:hidden fixed bottom-0 left-0 w-full h-16 bg-slate-950/80 backdrop-blur-md border-t border-white/5 z-40 px-1 flex justify-around items-center">
                                <button onClick={() => setCurrentTab("dashboard")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "dashboard" ? "text-primary font-bold" : "text-on-surface-variant"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">terminal</span><span class="text-[9px]">Overview</span></button>
                                <button onClick={() => setCurrentTab("books")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "books" ? "text-primary font-bold" : "text-on-surface-variant"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">library_books</span><span class="text-[9px]">Books</span></button>
                                <button onClick={() => setCurrentTab("Note")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "Note" ? "text-primary font-bold" : "text-on-surface-variant"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">description</span><span class="text-[9px]">Notes</span></button>
                                <button onClick={() => setCurrentTab("Sud_An")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "Sud_An" ? "text-primary font-bold" : "text-on-surface-variant"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">history_edu</span><span class="text-[9px]">Recalls</span></button>
                                <button onClick={() => setCurrentTab("folders")} class={`flex flex-col items-center justify-center p-1 ${currentTab === "folders" ? "text-primary font-bold" : "text-on-surface-variant"}`}><span class="material-symbols-outlined text-[20px] mb-0.5">folder_shared</span><span class="text-[9px]">Roots</span></button>
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
